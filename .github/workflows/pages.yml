name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - cursor/football-outlier-stats-app-f0b2
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache downloaded match events
        uses: actions/cache@v4
        with:
          path: data/cache/events
          key: statsbomb-events-v1-${{ hashFiles('app/pipeline.py', 'requirements.txt') }}
          restore-keys: |
            statsbomb-events-v1-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load 2015/16 top-league preset
        env:
          NO_AUTH_WARNINGS: "1"
        run: python scripts/load_data.py --preset

      - name: Build static site
        run: python scripts/export_static_site.py --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
